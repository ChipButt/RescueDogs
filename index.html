<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#172316" />
  <title>Dog Rescue Maze</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topBar">
      <div class="stat"><span>Food</span><strong id="foodCount">0</strong></div>
      <div class="title-block">
        <h1>Trash Yard Rescue</h1>
        <p id="statusText">Swipe and hold to move.</p>
      </div>
      <div class="stat"><span>Saved</span><strong id="rescuedCount">0</strong></div>
    </header>

    <main id="playArea">
      <canvas id="gameCanvas" width="360" height="360" aria-label="Dog rescue maze game canvas"></canvas>
    </main>

    <footer id="bottomControls">
      <div class="hint">Swipe and hold anywhere on the yard to keep moving.</div>
      <button id="dropFoodBtn" class="drop-food">DROP FOOD</button>
      <button id="restartBtn" class="restart">Restart</button>
    </footer>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="modalTitle">Mission</h2>
      <div id="modalText"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
